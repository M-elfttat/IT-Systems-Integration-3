<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Manage doctors and monitor appointments.</p>
      </div>
      <button onclick="logout()" class="secondary">Logout</button>
    </header>

    <section class="grid four stats-grid" id="stats-grid"></section>

    <section class="grid two">
      <div class="card">
        <div class="section-head"><h2>Add Doctor</h2></div>
        <form id="doctor-form" class="stack">
          <input type="text" name="full_name" placeholder="Doctor full name" required />
          <input type="text" name="specialization" placeholder="Specialization" required />
          <input type="text" name="availability" placeholder="Availability" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="text" name="phone" placeholder="Phone" required />
          <button type="submit">Add Doctor</button>
        </form>
        <div id="admin-message" class="message hidden"></div>
      </div>

      <div class="card">
        <div class="section-head"><h2>All Appointments</h2></div>
        <div class="table-wrap small-table">
          <table>
            <thead>
              <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Payment</th>
              </tr>
            </thead>
            <tbody id="admin-appointments-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
