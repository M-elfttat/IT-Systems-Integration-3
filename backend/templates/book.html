<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>Appointment Booking</h1>
        <p class="subtitle">Select a doctor, choose a date and time, and confirm your booking.</p>
      </div>
      <div class="actions-inline">
        <a href="/dashboard" class="secondary button-link">Dashboard</a>
        <button onclick="logout()" class="secondary">Logout</button>
      </div>
    </header>

    <section class="card booking-layout">
      <form id="booking-form" class="stack form-panel">
        <label>Doctor</label>
        <select id="doctor_id" name="doctor_id" required></select>
        <label>Date</label>
        <input type="date" id="appointment_date" name="appointment_date" required />
        <label>Time</label>
        <input type="time" id="appointment_time" name="appointment_time" required />
        <label>Notes</label>
        <textarea id="notes" name="notes" rows="5" placeholder="Add any appointment notes"></textarea>
        <button type="submit">Confirm Booking</button>
      </form>
      <div class="info-panel">
        <h3>Booking Notes</h3>
        <ul>
          <li>Patients must be logged in to book.</li>
          <li>Double booking for the same doctor and time is blocked.</li>
          <li>A payment record is created automatically with pending status.</li>
        </ul>
        <div id="booking-message" class="message hidden"></div>
      </div>
    </section>
  </div>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/book.js') }}"></script>
</body>
</html>
