services:
  db:
    image: postgres:16
    container_name: sysint_postgres
    environment:
      POSTGRES_DB: sysint_db
      POSTGRES_USER: sysint_user
      POSTGRES_PASSWORD: sysint_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: sysint_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:

