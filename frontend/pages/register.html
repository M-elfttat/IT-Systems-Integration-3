<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Doctor Appointment Booking System</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div>
        <h1>Doctor Appointment Booking System</h1>
        <p class="subtitle">Patient Registration</p>
      </div>
      <nav>
        <a href="../index.html">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container single-panel-page">
    <section class="panel auth-panel wide">
      <h2>Create Patient Account</h2>
      <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="full_name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone</label>
        <input type="text" id="phone" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit">Register</button>
      </form>
      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
