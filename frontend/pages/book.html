<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - Doctor Appointment Booking System</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div>
        <h1>Appointment Booking</h1>
        <p class="subtitle">Select doctor, date and time</p>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="doctors.html">Doctors</a>
        <a href="book.html">Book</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container page-grid">
    <section class="panel">
      <h2>Book an Appointment</h2>
      <form id="bookingForm">
        <label>Select Doctor</label>
        <select id="doctor_id" required></select>

        <label>Date</label>
        <input type="date" id="appointment_date" required>

        <label>Time</label>
        <input type="time" id="appointment_time" required>

        <label>Notes</label>
        <textarea id="notes" rows="4" placeholder="Optional notes"></textarea>

        <button type="submit">Confirm Booking</button>
      </form>
      <p id="message" class="message"></p>
    </section>

    <section class="panel">
      <h3>Doctor Availability</h3>
      <div id="doctorInfo" class="card-list"></div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/book.js"></script>
</body>
</html>
