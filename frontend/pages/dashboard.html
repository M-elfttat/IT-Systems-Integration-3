<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Doctor Appointment Booking System</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div>
        <h1>Patient Dashboard</h1>
        <p class="subtitle">View doctors and manage your appointments</p>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="doctors.html">Doctors</a>
        <a href="book.html">Book</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container page-grid">
    <section class="panel hero-panel">
      <h2 id="welcomeText">Welcome</h2>
      <p>Use the buttons below to browse doctors and book appointments based on specialization and availability.</p>
      <div class="button-row">
        <a class="button-link" href="doctors.html">View Doctors</a>
        <a class="button-link" href="book.html">Book Appointment</a>
      </div>
    </section>

    <section class="panel">
      <h3>Your Appointments</h3>
      <div id="appointmentsList" class="card-list"></div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
